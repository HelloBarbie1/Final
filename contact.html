<!doctype html> <!-- Declares this document as HTML5 so browsers render it in standards mode -->
<html lang="en"> <!-- Root element of the page; lang="en" tells browsers and screen readers the language -->
<head> <!-- Metadata container: information ABOUT the page, not content shown on the page -->
<meta charset="utf-8" /> <!-- Character encoding for readable text -->
<meta name="viewport" content="width=device-width, initial-scale=1" /> <!-- Enables responsive layout -->

<title>TameableJungle</title>

<link rel="stylesheet" href="CSS/styles.css" /> <!-- Global stylesheet for site-wide styling -->




<style>.hero-image { background-image: url("assets/plantapltns.png ");}


  </style>
<script src="js/includes.js" defer></script> <!-- Deferred JS for future header/footer injection -->

</head>

<body>

  <!-- SITE HEADER Role: Contains site identity and primary navigation.

   This section will eventually be moved into includes/header.html and injected using JavaScript. -->

  <header id="site-header" class="site-header"> <!-- Semantic role: site-wide header -->

   

  </header>

<main class="container" style="background-color: rgba(37, 74, 28, 0.345);">

  <div class="hero-image"> 
    <h1 class="hero">Contact</h1>
   
  </div>

  <!-- ADD MORE CONTENT HERE TO ENABLE SCROLL -->
  <div style="height: 1500px;">
    
     
<form action="https://formspree.io/f/mykboqvz" method="POST">
    
   <p>
      <label for="first-name">First Name</label>
      <input type="text" id="first-name" name="first-name"
      placeholder="first name">
    </p>

    <p>
      <label for="last-name">Last Name</label>
      <input type="text" id="last-name" name="last-name"placeholder="last name">
    </p>

    <p>
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required
      >
    </p>

    <p>
      <label for="phone">Phone</label>
      <input type="tel" id="phone" name="phone"
      placeholder="123-456-7890" pattern="[0-9]{3}-[0-9]{4}">
      
    </p>

    <p>
      <label for="message">Message</label><br>
      <textarea id="message" name="message" rows="6" cols="40"placeholder="Type your message here"></textarea></textarea>
    </p>

<fieldset>
  <legend><b>Best way to reach me</b></legend>

  <p>
    <input type="radio" 
    id="email-option"
     name="contact-method" 
     value="email">
    <label for="email-option">Email</label>
  </p>

  <p>
    <input 
    type="radio" 
    id="phone-option"
     name="contact-method"
      value="phone">
    <label for="phone-option">Phone</label>
  </p>

  <p>
    <input 
    type="radio"
     id="text-option"
      name="contact-method"
       value="text">
    <label for="text-option">Text</label>
  </p>
</fieldset>
<p>
  <label for="contact-time"><b>Best time to reach me</b></label>
  <select id="contact-time" name="contact-time">
    <option value="">--Select--</option>
    <option value="morning">Morning</option>
    <option value="afternoon">Afternoon</option>
    <option value="evening">Evening</option>
  </select>
</p>

<fieldset>
  <legend><b>How did you learn about this website</b></legend>

  <p>
    <input 
    type="checkbox" 
    id="updates"
     name="info" 
     value="updates">
    <label for="updates">Advertisement</label>
  </p>

  <p>
    <input 
    type="checkbox"
     id="plants"
      name="info"
       value="plants">
    <label for="plants">Friends/Family</label>
  </p>

  <p>
    <input 
    type="checkbox" 
    id="sales"
     name="info"
      value="sales">
    <label for="sales">Randomly</label>
  </p>
</fieldset>

    <p>
      <button type="submit">Send Message</button>
    </p>

  </form>

</main>
  



  <!-- SITE FOOTER Role: Contains secondary information (copyright, secondary links). Will also be extracted into an include later. -->

  <footer id="site-footer" class="site-footer"> <!-- Semantic role: site-wide footer -->

   <div class="container">

    <p>&copy; 2026 Joseph Santos </p>

   </div>

  </footer>






 </body>

</html>
